<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Pacientes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contêiner">
        <div class="cabecalho">
            <div class="conteudo-cabecalho">
                <h1>Clínica Médica</h1>
                <p>Sistema de Cadastro de Pacientes</p>
            </div>
        </div>

        <div class="conteudo-principal">
            <div class="secao-formulario">
                <h2>Cadastro de Paciente</h2>
                <form id="formularioPaciente">
                    <!-- NOVO: campo oculto para edição -->
                    <input type="hidden" id="pacienteId">

                    <div class="grupo-formulario">
                        <label for="nome">Nome*</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite o nome completo" required>
                        <span class="erro" id="erroNome"></span>
                    </div>

                    <div class="grupo-formulario">
                        <label for="cpf">CPF*</label>
                        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                        <span class="erro" id="erroCpf"></span>
                    </div>

                    <div class="grupo-formulario">
                        <label for="telefone">Telefone*</label>
                        <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
                        <span class="erro" id="erroTelefone"></span>
                    </div>

                    <div class="grupo-formulario">
                        <label for="cep">CEP*</label>
                        <input type="text" id="cep" name="cep" placeholder="00000-000" required>
                        <span class="erro" id="erroCep"></span>
                    </div>

                    <div class="grupo-formulario">
                        <label for="rua">Rua*</label>
                        <input type="text" id="rua" name="rua" placeholder="Digite a rua" required>
                        <span class="erro" id="erroRua"></span>
                    </div>

                    <div class="linha-formulario">
                        <div class="grupo-formulario">
                            <label for="numero">Número*</label>
                            <input type="text" id="numero" name="numero" placeholder="000" required>
                            <span class="erro" id="erroNumero"></span>
                        </div>
                        <div class="grupo-formulario">
                            <label for="bairro">Bairro*</label>
                            <input type="text" id="bairro" name="bairro" placeholder="Digite o bairro" required>
                            <span class="erro" id="erroBairro"></span>
                        </div>
                    </div>

                    <div class="linha-formulario">
                        <div class="grupo-formulario">
                            <label for="cidade">Cidade*</label>
                            <input type="text" id="cidade" name="cidade" placeholder="Digite a cidade" required>
                            <span class="erro" id="erroCidade"></span>
                        </div>
                        <div class="grupo-formulario">
                            <label for="estado">Estado*</label>
                            <input type="text" id="estado" name="estado" placeholder="SP" required maxlength="2">
                            <span class="erro" id="erroEstado"></span>
                        </div>
                    </div>

                    <div class="acoes-formulario">
                        <button type="submit" class="botao-primario">Cadastrar Paciente</button>
                        <button type="reset" class="botao-secundario">Limpar Formulário</button>
                    </div>
                    <div id="mensagem" class="mensagem"></div>
                </form>
            </div>

            <div class="secao-tabela">
                <div class="cabecalho-tabela">
                    <h2>Pacientes Cadastrados</h2>
                    <span class="contador" id="contador">0 pacientes</span>
                </div>

                <!-- NOVO: barra de pesquisa + botão PDF -->
                <div class="barra-pesquisa">
                    <input type="text" id="buscaNome" placeholder="Pesquisar por nome..." class="input-busca">
                    <button type="button" onclick="gerenciador.gerarRelatorioPDF()" class="botao-secundario">📄 Gerar PDF</button>
                </div>

                <div class="envoltorio-tabela">
                    <div class="recipiente-tabela" id="tabelaPacientes">
                        <div class="tabela-vazia">
                            <p>Nenhum paciente cadastrado ainda</p>
                        </div>
                    </div>
                </div>

                <!-- NOVO: Paginação -->
                <div class="paginacao" id="paginacao">
                    <button id="prevPage" class="botao-secundario">← Anterior</button>
                    <span id="infoPagina">Página 1 de 1</span>
                    <button id="nextPage" class="botao-secundario">Próxima →</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
    <!-- NOVO: Biblioteca para gerar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>

</html>
